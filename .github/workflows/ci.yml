name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-services:
    name: Go — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [gateway, guilds, messaging, presence]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

      - name: Test
        working-directory: services/${{ matrix.service }}
        run: go test ./...

  frontend-packages:
    name: Frontend — packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install

      - name: Type check
        run: pnpm run type-check

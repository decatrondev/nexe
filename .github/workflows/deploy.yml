name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: []
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /var/www/html/nexe
            git pull origin main

            # Build Go services
            for svc in gateway guilds messaging presence; do
              echo "Building $svc..."
              cd /var/www/html/nexe/services/$svc
              go build -o bin/$svc ./cmd/main.go
            done

            # Build frontend
            cd /var/www/html/nexe/apps/desktop
            pnpm install --no-frozen-lockfile
            pnpm build

            # Build web
            cd /var/www/html/nexe/apps/web
            pnpm install --no-frozen-lockfile
            npx next build

            # Restart services
            systemctl restart nexe-gateway nexe-guilds nexe-messaging nexe-presence nexe-web

            echo "Deploy complete!"

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            args: ""
          - platform: macos
            os: macos-latest
            args: "--target universal-apple-darwin"
          - platform: linux
            os: ubuntu-22.04
            args: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: pnpm install --no-frozen-lockfile
      - name: Install desktop deps
        working-directory: apps/desktop
        run: pnpm install

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Nexe ${{ github.ref_name }}"
          releaseBody: |
            ## Nexe ${{ github.ref_name }}

            Download for your platform:
            - **Windows:** `Nexe.exe` (run to install)
            - **macOS:** `.dmg` (Universal)
            - **Linux:** `.AppImage` or `.deb`
          releaseDraft: false
          prerelease: false

      # ── Upload standalone exe for Windows (self-installer, no NSIS) ──

      - name: Upload Nexe.exe (Windows self-installer)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $releaseDir = "apps/desktop/src-tauri/target/release"
          $exe = Get-ChildItem "$releaseDir/Nexe.exe" -ErrorAction SilentlyContinue
          if (!$exe) { $exe = Get-ChildItem "$releaseDir/*.exe" | Where-Object { $_.Name -notmatch 'setup|build|uninstall' } | Select-Object -First 1 }
          if ($exe) { Copy-Item $exe.FullName "Nexe.exe" }

      - name: Upload Nexe.exe to release
        if: matrix.platform == 'windows'
        uses: softprops/action-gh-release@v2
        with:
          files: Nexe.exe
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Portable update zips (for silent auto-updater) ──

      - name: Create portable update zip (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $releaseDir = "apps/desktop/src-tauri/target/release"
          $outDir = "update-package"
          New-Item -ItemType Directory -Path $outDir -Force

          $exe = Get-ChildItem "$releaseDir/Nexe.exe" -ErrorAction SilentlyContinue
          if (!$exe) { $exe = Get-ChildItem "$releaseDir/*.exe" | Where-Object { $_.Name -notmatch 'setup|build|uninstall' } | Select-Object -First 1 }
          if ($exe) { Copy-Item $exe.FullName "$outDir/Nexe.exe" }

          Get-ChildItem "$releaseDir/*.dll" | ForEach-Object { Copy-Item $_.FullName "$outDir/" }

          # Include WebView2Loader if present
          if (Test-Path "$releaseDir/WebView2Loader.dll") { Copy-Item "$releaseDir/WebView2Loader.dll" "$outDir/" }

          $zipName = "nexe-update-${version}-windows-x86_64.zip"
          Compress-Archive -Path "$outDir/*" -DestinationPath $zipName

          # SHA256
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "${zipName}.sha256" -Value $hash -NoNewline

      - name: Create portable update zip (macOS)
        if: matrix.platform == 'macos'
        run: |
          VERSION="${{ github.ref_name }}"
          BUNDLE_DIR="apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos"
          APP=$(find "$BUNDLE_DIR" -maxdepth 1 -name "*.app" -type d | head -1)
          ZIP_NAME="nexe-update-${VERSION}-darwin-universal.zip"
          if [ -n "$APP" ]; then
            cd "$BUNDLE_DIR"
            zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" "$(basename "$APP")"
            cd "$GITHUB_WORKSPACE"
            shasum -a 256 "$ZIP_NAME" | awk '{print $1}' > "${ZIP_NAME}.sha256"
          fi

      - name: Create portable update zip (Linux)
        if: matrix.platform == 'linux'
        run: |
          VERSION="${{ github.ref_name }}"
          RELEASE_DIR="apps/desktop/src-tauri/target/release"
          ZIP_NAME="nexe-update-${VERSION}-linux-x86_64.zip"
          mkdir -p update-package

          for name in nexe Nexe app; do
            if [ -f "$RELEASE_DIR/$name" ] && file "$RELEASE_DIR/$name" | grep -q ELF; then
              cp "$RELEASE_DIR/$name" update-package/nexe
              break
            fi
          done

          if [ "$(ls -A update-package)" ]; then
            cd update-package
            zip -r "$GITHUB_WORKSPACE/$ZIP_NAME" .
            cd "$GITHUB_WORKSPACE"
            sha256sum "$ZIP_NAME" | awk '{print $1}' > "${ZIP_NAME}.sha256"
          fi

      - name: Upload portable update zip + sha256
        uses: softprops/action-gh-release@v2
        with:
          files: |
            nexe-update-*.zip
            nexe-update-*.zip.sha256
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-desktop:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            args: ""
          - platform: macos
            os: macos-latest
            args: "--target universal-apple-darwin"
          - platform: linux
            os: ubuntu-22.04
            args: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install desktop dependencies
        working-directory: apps/desktop
        run: pnpm install

      - name: Build & Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tauriScript: pnpm tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Nexe ${{ github.ref_name }}"
          releaseBody: |
            ## Nexe ${{ github.ref_name }}

            Download the installer for your platform:
            - **Windows:** `.exe` (installer) or `.msi`
            - **macOS:** `.dmg` (Universal — Intel + Apple Silicon)
            - **Linux:** `.deb` (Ubuntu/Debian) or `.AppImage`
          releaseDraft: false
          prerelease: false

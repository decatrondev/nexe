name: Build & Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - platform: macos-intel
            os: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-arm
            os: macos-latest
            target: aarch64-apple-darwin
          - platform: linux
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install frontend deps
        working-directory: apps/desktop
        run: pnpm install

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_name }}
          releaseName: "Nexe ${{ github.ref_name }}"
          releaseBody: |
            ## Nexe ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File |
            |----------|------|
            | Windows | `.exe` or `.msi` |
            | macOS (Intel) | `.dmg` |
            | macOS (Apple Silicon) | `.dmg` |
            | Linux | `.deb` or `.AppImage` |
          releaseDraft: false
          prerelease: false
